name: Daily IBM VM Provisioning

on:
  schedule:
    # Run daily at midnight UTC (0 0 * * *)
    - cron: '0 0 * * *'
  workflow_dispatch: # Allow manual triggering for testing

jobs:
  provision-ibm-vm:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        
      - name: Install IBM Cloud CLI
        run: |
          curl -fsSL https://clis.cloud.ibm.com/install/linux | sh
          ibmcloud --version
          
      - name: Parse VM configuration from secrets
        id: parse-config
        run: |
          # Parse the JSON secret and extract configuration values
          echo "${{ secrets.IBM_VM_CONFIG }}" | jq -r 'to_entries[] | "\(.key)=\(.value)"' >> $GITHUB_ENV
          
      - name: Authenticate with IBM Cloud
        run: |
          # Login to IBM Cloud (assuming API key is in secrets)
          ibmcloud login --apikey "${{ secrets.IBM_CLOUD_API_KEY }}" -r "$Zone" > /dev/null 2>&1
          
      - name: Provision IBM VM
        run: |
          # Provision the VM with muted output for security
          ibmcloud is instance-create \
            "$Instance_Name" \
            "$VPC_Name" \
            "$Zone" \
            "$Instance_Profile" \
            "$Subnet_ID" \
            --image-id "$Image_ID" \
            --security-group-ids "$Security_Group_ID" \
            --user-data @.github/ibm-runner-config.yaml \
            > /dev/null 2>&1
            
          if [ $? -eq 0 ]; then
            echo "✅ IBM VM provisioned successfully"
          else
            echo "❌ Failed to provision IBM VM"
            exit 1
          fi
          
      - name: Cleanup
        if: always()
        run: |
          # Logout from IBM Cloud
          ibmcloud logout > /dev/null 2>&1 || true
